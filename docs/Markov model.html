  <script id="20" type="module" pinned="">
    // Markov Chain Language Model class
    class MarkovModel {
      constructor(text, order = 2) {
        this.order = order;
        this.chains = new Map();
        this.train(text);
      }

      // Clean and tokenize text
      tokenize(text) {
        return text.toLowerCase()
          .replace(/[^\w\s\.!?]/g, '')
          .split(/\s+/)
          .filter(word => word.length > 0);
      }

      // Train the model on the provided text
      train(text) {
        const tokens = this.tokenize(text);

        for (let i = 0; i <= tokens.length - this.order - 1; i++) {
          const key = tokens.slice(i, i + this.order).join(' ');
          const nextWord = tokens[i + this.order];

          if (!this.chains.has(key)) {
            this.chains.set(key, []);
          }
          this.chains.get(key).push(nextWord);
        }
      }

      // Generate text of specified length
      generate(length = 50) {
        if (this.chains.size === 0) return "No training data available.";

        // Start with a random key
        const keys = Array.from(this.chains.keys());
        let currentKey = keys[Math.floor(Math.random() * keys.length)];
        let result = currentKey.split(' ');

        for (let i = 0; i < length - this.order; i++) {
          const possibleWords = this.chains.get(currentKey);
          if (!possibleWords || possibleWords.length === 0) break;

          // Randomly select next word
          const nextWord = possibleWords[Math.floor(Math.random() * possibleWords.length)];
          result.push(nextWord);

          // Update current key for next iteration
          const keyWords = currentKey.split(' ');
          keyWords.shift();
          keyWords.push(nextWord);
          currentKey = keyWords.join(' ');

          if (!this.chains.has(currentKey)) break;
        }

        return result.join(' ');
      }
    }
  </script>

  <script id="23" type="text/markdown">
    ## How the Markov Language Model Works

    This Markov Language Model generates text by learning patterns from sample text and then creating new sentences based on those patterns. Here's how it works:

    **Key Concepts:**
    - **Order (n-gram size)**: Determines how many consecutive words the model considers when predicting the next word. Higher order = more context but potentially less creativity.
    - **Training**: The model analyzes the sample text and builds a map of word sequences to possible next words.
    - **Generation**: Starting with a random sequence, it repeatedly predicts the next word based on the current context.

    **Parameters:**
    - **Order 1**: Each word depends only on the previous word (bigrams)
    - **Order 2**: Each word depends on the previous two words (trigrams) - good balance
    - **Order 3+**: More context but may reproduce original text more closely

    **Use Cases:**
    - Text generation for creative writing
    - Chatbot responses
    - Data augmentation for NLP tasks
    - Understanding language patterns

    Try adjusting the order and length parameters to see how they affect the generated text quality and creativity!
  </script>
